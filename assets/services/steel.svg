<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071521"/><stop offset="1" stop-color="#1a3a55"/></linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#94A3B8"/><stop offset=".5" stop-color="#E2E8F0"/><stop offset="1" stop-color="#64748B"/></linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 4;0 -4;0 4" dur="4s" repeatCount="indefinite"/>
    <rect x="70" y="70" width="18" height="130" rx="2" fill="url(#steel)" transform="rotate(-18 79 135)"/>
    <rect x="120" y="55" width="18" height="145" rx="2" fill="url(#steel)" transform="rotate(12 129 127)"/>
    <rect x="175" y="65" width="20" height="140" rx="2" fill="url(#steel)"/>
    <rect x="230" y="50" width="18" height="150" rx="2" fill="url(#steel)" transform="rotate(-10 239 125)"/>
    <rect x="285" y="60" width="18" height="140" rx="2" fill="url(#steel)" transform="rotate(8 294 130)"/>
  </g>
  <rect x="55" y="175" width="290" height="14" rx="2" fill="#C9A227" opacity=".85">
    <animate attributeName="opacity" values=".85;1;.85" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <circle cx="100" cy="45" r="3" fill="#C9A227" opacity=".5">
    <animate attributeName="cy" values="45;30;45" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="40" r="2" fill="#E0C35A" opacity=".55">
    <animate attributeName="cy" values="40;28;40" dur="2.6s" begin=".4s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="220" text-anchor="middle" fill="#C9A227" font-family="sans-serif" font-size="12" font-weight="700" letter-spacing="3" opacity=".7">STRUCTURAL STEEL</text>
</svg>
