<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="240"><stop stop-color="#0B1F33"/><stop offset="1" stop-color="#14304A"/></linearGradient>
    <linearGradient id="bag" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#C9A227"/><stop offset="1" stop-color="#A6851C"/></linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <circle cx="320" cy="40" r="80" stroke="#C9A227" stroke-opacity=".15" stroke-width="1.5">
    <animate attributeName="r" values="75;85;75" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="40" r="50" stroke="#C9A227" stroke-opacity=".25" stroke-width="1">
    <animate attributeName="r" values="48;55;48" dur="5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0" dur="3.5s" repeatCount="indefinite"/>
    <rect x="90" y="95" width="70" height="95" rx="4" fill="url(#bag)"/>
    <rect x="98" y="108" width="54" height="18" rx="2" fill="#0B1F33" opacity=".35"/>
    <text x="125" y="122" text-anchor="middle" fill="#0B1F33" font-family="sans-serif" font-size="11" font-weight="700">CEMENT</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -8;0 0" dur="4s" begin="0.4s" repeatCount="indefinite"/>
    <rect x="175" y="80" width="70" height="110" rx="4" fill="#E0C35A"/>
    <rect x="183" y="95" width="54" height="18" rx="2" fill="#0B1F33" opacity=".3"/>
    <text x="210" y="109" text-anchor="middle" fill="#0B1F33" font-family="sans-serif" font-size="11" font-weight="700">OPC</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="3.2s" begin="0.8s" repeatCount="indefinite"/>
    <rect x="260" y="100" width="70" height="90" rx="4" fill="#C9A227"/>
    <rect x="268" y="112" width="54" height="18" rx="2" fill="#0B1F33" opacity=".3"/>
  </g>
  <circle cx="130" cy="70" r="3" fill="#C9A227" opacity=".5">
    <animate attributeName="cy" values="70;55;70" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".5;.2;.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="55" r="2" fill="#E0C35A" opacity=".6">
    <animate attributeName="cy" values="55;40;55" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="75" r="2.5" fill="#C9A227" opacity=".4">
    <animate attributeName="cy" values="75;60;75" dur="2.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <path d="M60 210h280" stroke="#C9A227" stroke-opacity=".2" stroke-width="2"/>
</svg>
