<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0B1F33"/><stop offset="1" stop-color="#1a3a55"/></linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <g>
    <animateTransform attributeName="transform" type="rotate" values="-6 200 120;6 200 120;-6 200 120" dur="4s" repeatCount="indefinite"/>
    <g transform="translate(145,45)">
      <path d="M40 20 a28 28 0 1 1 20 48 L90 98 a10 10 0 0 1-14 14 L46 82 A28 28 0 0 1 40 20 Z" fill="#C9A227"/>
      <circle cx="40" cy="42" r="12" fill="#0B1F33"/>
      <rect x="78" y="95" width="18" height="70" rx="4" fill="#E0C35A" transform="rotate(45 87 130)"/>
    </g>
  </g>
  <circle cx="90" cy="60" r="3" fill="#C9A227" opacity=".5">
    <animate attributeName="cy" values="60;48;60" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="70" r="2.5" fill="#E0C35A" opacity=".55">
    <animate attributeName="cy" values="70;55;70" dur="3s" begin=".4s" repeatCount="indefinite"/>
  </circle>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="3.2s" begin=".5s" repeatCount="indefinite"/>
    <circle cx="80" cy="160" r="16" fill="#64748B" stroke="#C9A227" stroke-width="2"/>
    <circle cx="80" cy="160" r="6" fill="#0B1F33"/>
    <circle cx="330" cy="155" r="16" fill="#718096" stroke="#C9A227" stroke-width="2"/>
    <circle cx="330" cy="155" r="6" fill="#0B1F33"/>
  </g>
  <text x="200" y="220" text-anchor="middle" fill="#C9A227" font-family="sans-serif" font-size="12" font-weight="700" letter-spacing="2" opacity=".75">HARDWARE</text>
</svg>
