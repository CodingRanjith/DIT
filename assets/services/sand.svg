<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#0B1F33"/><stop offset="1" stop-color="#1a3048"/></linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#E0C35A"/><stop offset="1" stop-color="#A6851C"/></linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <path d="M40 200 C90 140, 140 120, 200 145 C260 170, 310 115, 360 160 L360 220 L40 220 Z" fill="url(#sand)" opacity=".9">
    <animate attributeName="d" dur="5s" repeatCount="indefinite"
      values="M40 200 C90 140, 140 120, 200 145 C260 170, 310 115, 360 160 L360 220 L40 220 Z;
              M40 200 C90 150, 140 110, 200 155 C260 160, 310 125, 360 155 L360 220 L40 220 Z;
              M40 200 C90 140, 140 120, 200 145 C260 170, 310 115, 360 160 L360 220 L40 220 Z"/>
  </path>
  <path d="M60 210 C110 165, 160 155, 210 175 C270 200, 320 150, 370 185 L370 230 L60 230 Z" fill="#C9A227" opacity=".55"/>
  <circle cx="120" cy="100" r="2.5" fill="#E0C35A">
    <animate attributeName="cy" values="100;80;100" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;.3;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="80" r="2" fill="#C9A227">
    <animate attributeName="cy" values="80;60;80" dur="2.8s" begin=".3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="95" r="3" fill="#E0C35A" opacity=".7">
    <animate attributeName="cy" values="95;75;95" dur="3s" begin=".6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="70" r="2" fill="#C9A227">
    <animate attributeName="cy" values="70;50;70" dur="2.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <ellipse cx="200" cy="55" rx="55" ry="18" stroke="#C9A227" stroke-opacity=".25" fill="none">
    <animate attributeName="rx" values="50;60;50" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <text x="200" y="40" text-anchor="middle" fill="#E0C35A" font-family="sans-serif" font-size="13" font-weight="700" letter-spacing="4">SAND</text>
</svg>
