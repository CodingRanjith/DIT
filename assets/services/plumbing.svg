<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#071521"/><stop offset="1" stop-color="#14304A"/></linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="3.6s" repeatCount="indefinite"/>
    <rect x="80" y="100" width="160" height="22" rx="11" fill="#64748B"/>
    <rect x="80" y="100" width="160" height="8" rx="4" fill="#94A3B8" opacity=".5"/>
    <rect x="220" y="70" width="22" height="100" rx="11" fill="#718096"/>
    <rect x="240" y="140" width="100" height="22" rx="11" fill="#64748B"/>
    <circle cx="231" cy="111" r="18" fill="#4A5568" stroke="#C9A227" stroke-width="2"/>
    <circle cx="231" cy="111" r="8" fill="#C9A227" opacity=".8">
      <animate attributeName="opacity" values=".6;1;.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <ellipse cx="300" cy="90" rx="6" ry="9" fill="#38BDF8" opacity=".7">
    <animate attributeName="cy" values="70;150;70" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.8;0" dur="2.2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="320" cy="120" rx="5" ry="8" fill="#7DD3FC" opacity=".55">
    <animate attributeName="cy" values="80;160;80" dur="2.6s" begin=".6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.7;0" dur="2.6s" begin=".6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="280" cy="130" rx="4" ry="7" fill="#38BDF8" opacity=".45">
    <animate attributeName="cy" values="90;155;90" dur="2.4s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.6;0" dur="2.4s" begin="1.1s" repeatCount="indefinite"/>
  </ellipse>
  <text x="200" y="210" text-anchor="middle" fill="#C9A227" font-family="sans-serif" font-size="12" font-weight="700" letter-spacing="3" opacity=".75">PLUMBING</text>
</svg>
